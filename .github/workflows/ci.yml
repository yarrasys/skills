name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Smoke the locked entrypoint
        run: uv run --locked skills/kdbx/kdbx.py --version
      - name: Run tests
        run: >-
          uv run --with pytest --with pykeepass --with python-dotenv
          --with filelock --with platformdirs --with "mcp>=1.0,<2"
          python -m pytest -q

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Ruff (lint + format check)
        run: |
          uvx ruff check .
          uvx ruff format --check .
      - name: Validate plugin manifests + skill symlink
        run: |
          python -c "import json; [json.load(open(f)) for f in ['.claude-plugin/marketplace.json', 'plugins/kdbx/.claude-plugin/plugin.json', 'plugins/kdbx/hooks/hooks.json', 'plugins/kdbx/.mcp.json']]"
          test -f plugins/kdbx/skills/kdbx/SKILL.md
      - name: Lockfiles are current
        run: |
          uv lock --script skills/kdbx/kdbx.py --check
          uv lock --script plugins/kdbx/mcp/server.py --check
